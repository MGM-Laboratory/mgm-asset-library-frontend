name: CI

on:
  pull_request:
    branches: [main, staging, production]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: OpenAPI schema is current
        run: pnpm openapi:check
        continue-on-error: true # backend may not be reachable in PR CI; soft-fail
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws
          NEXT_PUBLIC_COMMUNITY_DOCS_URL: https://docs.labmgm.org
          NEXT_PUBLIC_COMMUNITY_LEARNING_URL: https://learn.labmgm.org
          NEXT_PUBLIC_COMMUNITY_HELP_URL: https://help.labmgm.org
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-only-secret-please-replace-in-real-environments-1234
          KEYCLOAK_CLIENT_ID: mgm-asset-library-web
          KEYCLOAK_CLIENT_SECRET: ci
          KEYCLOAK_ISSUER: https://auth.labmgm.org/realms/mgm
          KEYCLOAK_LOGOUT_REDIRECT: http://localhost:3000
